<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Slackometer v6 — Dark</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #141414;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .wrap {
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.4rem;
            max-width: 480px;
            margin: 0 auto;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .stat {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
            border: 0.5px solid #2a2a2a;
        }

        .stat-label {
            font-size: 11px;
            color: #777;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-val {
            font-size: 22px;
            font-weight: 500;
            color: #f5f5f5;
        }

        .btns {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

            .btns button {
                flex: 1;
                padding: 12px 8px;
                border-radius: 10px;
                border: 1px solid #333;
                background: #1e1e1e;
                color: #e0e0e0;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.15s, transform 0.1s, border-color 0.15s, color 0.15s;
            }

                .btns button:hover {
                    background: #262626;
                }

                .btns button:active {
                    transform: scale(0.97);
                }

        .btn-slack {
            border-color: #E24B4A !important;
            color: #E24B4A !important;
        }

            .btn-slack:hover {
                background: #2a1010 !important;
            }

        .btn-recover {
            border-color: #1D9E75 !important;
            color: #1D9E75 !important;
        }

            .btn-recover:hover {
                background: #0a2018 !important;
            }

        .status-badge {
            font-size: 13px;
            font-weight: 500;
            padding: 7px 20px;
            border-radius: 999px;
            letter-spacing: 0.03em;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .warning-panel {
            display: flex;
            gap: 14px;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 0.5px solid #2a2a2a;
            background: #151515;
            min-height: 56px;
        }

        .w-light {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0.18;
            transition: opacity 0.4s;
        }

            .w-light.on {
                opacity: 1;
            }

            .w-light.pulse {
                animation: wpulse 1.1s ease-in-out infinite;
            }

        .w-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .w-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .w-engine .w-icon {
            background: #2a1f0a;
            color: #EF9F27;
        }

        .w-engine .w-label {
            color: #EF9F27;
        }

        .w-temp .w-icon {
            background: #2a0f0f;
            color: #E24B4A;
        }

        .w-temp .w-label {
            color: #E24B4A;
        }

        .w-oil .w-icon {
            background: #2a1a0a;
            color: #FA8C3A;
        }

        .w-oil .w-label {
            color: #FA8C3A;
        }

        .w-battery .w-icon {
            background: #2a0f0f;
            color: #F09595;
        }

        .w-battery .w-label {
            color: #F09595;
        }

        .needle {
            transform-origin: 200px 185px;
            transition: transform 0.7s cubic-bezier(0.34,1.56,0.64,1);
        }

        .redflash {
            pointer-events: none;
            position: absolute;
            inset: 0;
            background: #E24B4A;
            opacity: 0;
            border-radius: 14px;
            z-index: 10;
        }

            .redflash.on {
                animation: rf 0.7s ease-in-out infinite;
            }

        @keyframes rf {
            0%,100% {
                opacity: 0
            }

            50% {
                opacity: 0.18
            }
        }

        @keyframes wpulse {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: 0.35
            }
        }

        .shake {
            animation: shk 0.3s ease;
        }

        @keyframes shk {
            0%,100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-5px)
            }

            75% {
                transform: translateX(5px)
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="wrap" id="mainwrap" style="position:relative;">
        <h2 class="sr-only">Slackometer — RPM-style gauge tracking daily task slacking</h2>
        <div class="redflash" id="redOverlay"></div>

        <!-- increased height so 70–100 are visible -->
        <svg width="400" height="320" viewBox="0 0 400 320" role="img" aria-hidden="true">
            <g id="gaugeGroup"></g>

            <!-- Needle -->
            <g class="needle" id="needle">
                <polygon points="200,65 196,182 204,182" fill="#d0d0d0" opacity="0.9" />
                <circle cx="200" cy="185" r="10" fill="#1e1e1e" stroke="#444" stroke-width="1.5" />
                <circle cx="200" cy="185" r="4" fill="#f5f5f5" />
            </g>

            <text id="scoreText" x="200" y="145" text-anchor="middle"
                  font-size="34" font-weight="500" fill="#f5f5f5"
                  font-family="system-ui,Segoe UI,sans-serif">0</text>
            <text x="200" y="163" text-anchor="middle"
                  font-size="11" fill="#888"
                  font-family="system-ui,Segoe UI,sans-serif"
                  letter-spacing="0.08em">SLACK RPM</text>
        </svg>

        <span class="status-badge" id="statusBadge"
              style="background:#0d2218;color:#1D9E75;border:1px solid #1D9E75;">Locked in</span>

        <div class="warning-panel">
            <div class="w-light w-engine" id="wEngine">
                <div class="w-icon"><i class="ti ti-engine" aria-hidden="true"></i></div>
                <div class="w-label">Engine</div>
            </div>
            <div class="w-light w-temp" id="wTemp">
                <div class="w-icon"><i class="ti ti-temperature" aria-hidden="true"></i></div>
                <div class="w-label">Temp</div>
            </div>
            <div class="w-light w-oil" id="wOil">
                <div class="w-icon"><i class="ti ti-droplet" aria-hidden="true"></i></div>
                <div class="w-label">Oil</div>
            </div>
            <div class="w-light w-battery" id="wBattery">
                <div class="w-icon"><i class="ti ti-bolt" aria-hidden="true"></i></div>
                <div class="w-label">Battery</div>
            </div>
        </div>

        <div class="btns">
            <button class="btn-slack" type="button" onclick="addSlack()">+ Slack</button>
            <button class="btn-recover" type="button" onclick="recover()">− Recover</button>
            <button type="button" onclick="reset()">Reset</button>
        </div>

        <div class="stats-row">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-val" id="statScore">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Slacks</div>
                <div class="stat-val" id="statSlacks">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Recoveries</div>
                <div class="stat-val" id="statRec">0</div>
            </div>
        </div>
    </div>

    <script>
        const CX = 200, CY = 185;
        const ARC_R = 130;
        const TICK_OUT = ARC_R - 10;
        const TICK_MAJ = ARC_R - 24;
        const TICK_MIN = ARC_R - 17;
        const LABEL_R = ARC_R - 38;

        // Arc sweeps from 210° (bottom-left) to 450° (bottom-right through top) = 240°
        const START_DEG = 210;
        const TOTAL_SPAN = 240;

        function d2r(d) { return d * Math.PI / 180; }
        function polar(r, deg) {
            const a = d2r(deg);
            return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
        }

        const endDeg = START_DEG + TOTAL_SPAN;
        const [sx, sy] = polar(ARC_R, START_DEG);
        const [ex, ey] = polar(ARC_R, endDeg);
        // span >180°, large-arc-flag=1, sweep=1
        const ARC_PATH = `M ${sx.toFixed(2)} ${sy.toFixed(2)} A ${ARC_R} ${ARC_R} 0 1 1 ${ex.toFixed(2)} ${ey.toFixed(2)}`;
        const ARC_LEN = Math.PI * ARC_R * (TOTAL_SPAN / 180);

        function buildGauge() {
            const NS = 'http://www.w3.org/2000/svg';
            const g = document.getElementById('gaugeGroup');

            // background track (thick grey arc)
            const bg = document.createElementNS(NS, 'path');
            bg.setAttribute('d', ARC_PATH);
            bg.setAttribute('fill', 'none');
            bg.setAttribute('stroke', '#2f2f2f');
            bg.setAttribute('stroke-width', '18');
            bg.setAttribute('stroke-linecap', 'round');
            g.appendChild(bg);

            // coloured fill arcs (progress bar)
            [['arcGreen', '#1D9E75'], ['arcYellow', '#BA7517'], ['arcRed', '#E24B4A']].forEach(([id, col]) => {
                const p = document.createElementNS(NS, 'path');
                p.setAttribute('id', id);
                p.setAttribute('d', ARC_PATH);
                p.setAttribute('fill', 'none');
                p.setAttribute('stroke', col);
                p.setAttribute('stroke-width', '18');
                p.setAttribute('stroke-linecap', 'butt');
                p.setAttribute('stroke-dasharray', `0 ${ARC_LEN.toFixed(1)}`);
                g.appendChild(p);
            });

            // ticks + labels
            const tg = document.createElementNS(NS, 'g');
            for (let v = 0; v <= 100; v += 5) {
                const isMaj = v % 10 === 0;
                const deg = START_DEG + (v / 100) * TOTAL_SPAN;
                const a = d2r(deg);
                const cos = Math.cos(a), sin = Math.sin(a);

                const col = v >= 60 ? '#E24B4A' : v >= 25 ? '#BA7517' : '#1D9E75';
                const colLt = v >= 60 ? '#F09595' : v >= 25 ? '#EF9F27' : '#5DCAA5';

                const x1 = CX + TICK_OUT * cos, y1 = CY + TICK_OUT * sin;
                const x2 = CX + (isMaj ? TICK_MAJ : TICK_MIN) * cos, y2 = CY + (isMaj ? TICK_MAJ : TICK_MIN) * sin;

                const ln = document.createElementNS(NS, 'line');
                ln.setAttribute('x1', x1.toFixed(2)); ln.setAttribute('y1', y1.toFixed(2));
                ln.setAttribute('x2', x2.toFixed(2)); ln.setAttribute('y2', y2.toFixed(2));
                ln.setAttribute('stroke', isMaj ? col : colLt);
                ln.setAttribute('stroke-width', isMaj ? '2' : '1');
                ln.setAttribute('stroke-linecap', 'round');
                tg.appendChild(ln);

                if (isMaj) {
                    const lx = (CX + LABEL_R * cos).toFixed(2);
                    const ly = (CY + LABEL_R * sin + 4).toFixed(2);
                    const tx = document.createElementNS(NS, 'text');
                    tx.setAttribute('x', lx); tx.setAttribute('y', ly);
                    tx.setAttribute('text-anchor', 'middle');
                    tx.setAttribute('font-size', '10');
                    tx.setAttribute('font-family', 'system-ui,Segoe UI,sans-serif');
                    tx.setAttribute('fill', col);
                    tx.setAttribute('font-weight', '500');
                    tx.textContent = v;
                    tg.appendChild(tx);
                }
            }
            g.appendChild(tg);
        }

        function setArcs() {
            const L = ARC_LEN;
            // Green: 0–25, Yellow: 25–50, Red: 50–100
            const gp = Math.min(score, 25) / 100;
            const yp = Math.min(Math.max(score - 25, 0), 25) / 100;
            const rp = Math.min(Math.max(score - 50, 0), 50) / 100;
            const set = (id, len, off) => {
                const el = document.getElementById(id);
                el.setAttribute('stroke-dasharray', `${(len * L).toFixed(1)} ${L.toFixed(1)}`);
                el.setAttribute('stroke-dashoffset', `${(-off * L).toFixed(1)}`);
            };
            set('arcGreen', gp, 0);
            set('arcYellow', yp, gp);
            set('arcRed', rp, gp + yp);
        }

        function setWarnings() {
            const wE = document.getElementById('wEngine'), wT = document.getElementById('wTemp');
            const wO = document.getElementById('wOil'), wB = document.getElementById('wBattery');
            const ov = document.getElementById('redOverlay');
            [wE, wT, wO, wB].forEach(el => el.classList.remove('on', 'pulse'));
            ov.classList.remove('on');
            if (score >= 81) { [wE, wT, wO, wB].forEach(el => el.classList.add('on', 'pulse')); ov.classList.add('on'); }
            else if (score >= 61) { wE.classList.add('on', 'pulse'); wT.classList.add('on', 'pulse'); wO.classList.add('on'); }
            else if (score >= 41) { wE.classList.add('on', 'pulse'); }
        }

        function updateStatus() {
            const b = document.getElementById('statusBadge');
            const states = [
                [20, 'Locked in', '#0d2218', '#1D9E75', '#1D9E75'],
                [40, 'Distracted', '#1e1500', '#EF9E27', '#BA7517'],
                [60, 'Slipping', '#1e1000', '#FA8C3A', '#854F0B'],
                [80, 'Critical', '#2a0808', '#E24B4A', '#A32D2D'],
                [100, 'Absolute slacklord', '#E24B4A', '#ffffff', 'transparent']
            ];
            const s = states.find(([thresh]) => score <= thresh);
            b.textContent = s[1];
            b.style.background = s[2];
            b.style.color = s[3];
            b.style.border = s[4] === 'transparent' ? 'none' : `1px solid ${s[4]}`;
        }

        let score = 0, slacks = 0, recs = 0;

        function render() {
            score = Math.max(0, Math.min(100, score));
            const deg = START_DEG + (score / 100) * TOTAL_SPAN;
            document.getElementById('needle').style.transform = `rotate(${deg - 270}deg)`;
            document.getElementById('scoreText').textContent = score;
            document.getElementById('statScore').textContent = score;
            document.getElementById('statSlacks').textContent = slacks;
            document.getElementById('statRec').textContent = recs;
            setArcs();
            setWarnings();
            updateStatus();
        }

        function addSlack() {
            score += 5; slacks++;
            const w = document.getElementById('mainwrap');
            w.classList.remove('shake'); void w.offsetWidth;
            if (score > 60) w.classList.add('shake');
            render();
        }
        function recover() { score -= 5; recs++; render(); }
        function reset() { score = 0; slacks = 0; recs = 0; render(); }

        buildGauge();
        render();
    </script>

</body>
</html>
